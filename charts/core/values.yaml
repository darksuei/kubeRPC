app:
  name: kuberpc-core
  namespace: kuberpc
  replicas: 1 # when cache type is memory, data is inside the pod - scale replicas if cache type is redis
  serviceAccountName: kuberpc-core-sa
  serviceRole: kuberpc-core-role
  serviceRoleBinding: kuberpc-core-role-binding
  port: 8080
  image:
    repository: docker.io/darksueii/kuberpc
    tag: "2.0.1"
    pullPolicy: Always

service:
  type: ClusterIP
  protocol: TCP

secret:
  name: kuberpc-core-secret
  data:
    PORT: "8080"
    CACHE_TYPE: "memory" # memory | redis
    REDIS_HOST: ""
    REDIS_PORT: ""
    REDIS_PASSWORD: ""

webhook:
  enabled: true
  port: 9443
  # URL injected into pods as KUBERPC_CORE_URL.
  # Defaults to http://<app.name>.<release-namespace>.svc.cluster.local:<app.port>
  coreURL: ""
  tlsSecretName: kuberpc-core-webhook-tls

# Set certManager.enabled=true if cert-manager is available in the cluster.
# When false, the chart generates a self-signed cert via Helm's genCA/genSignedCert.
certManager:
  enabled: false
  issuerName: ""       # name of a cert-manager Issuer or ClusterIssuer
  issuerKind: Issuer   # Issuer | ClusterIssuer
