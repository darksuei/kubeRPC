app:
  name: kuberpc-core
  namespace: kuberpc
  replicas: 1 # when cache type is memory, data is inside the pod - scale replicas if cache type is redis
  serviceAccountName: kuberpc-core-sa
  serviceRole: kuberpc-core-role
  serviceRoleBinding: kuberpc-core-role-binding
  port: 8080
  image:
    repository: docker.io/darksueii/kuberpc
    tag: "1.0.0"
    pullPolicy: Always

service:
  type: ClusterIP
  protocol: TCP

secret:
  name: kuberpc-core-secret
  data:
    PORT: "8080"
    CACHE_TYPE: "memory" # memory | redis
    REDIS_HOST: ""
    REDIS_PORT: ""
    REDIS_PASSWORD: ""
